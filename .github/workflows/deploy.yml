name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MITTWALD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.MITTWALD_PORT }} ${{ secrets.MITTWALD_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.MITTWALD_PORT }} ${{ secrets.MITTWALD_USER }}@${{ secrets.MITTWALD_HOST }} "echo SSH OK"

      - name: Deploy via SCP
        env:
          DEPLOY_HOST: ${{ secrets.MITTWALD_HOST }}
          DEPLOY_PORT: ${{ secrets.MITTWALD_PORT }}
          DEPLOY_USER: ${{ secrets.MITTWALD_USER }}
          DEPLOY_PATH: ${{ secrets.MITTWALD_DEPLOY_PATH }}
        run: |
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT}" -r *.html assets/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
