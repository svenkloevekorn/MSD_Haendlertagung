name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: p700904.webspaceconfig.de
          username: p700904
          key: ${{ secrets.MITTWALD_SSH_KEY }}
          source: "*.html,assets/"
          target: ${{ secrets.MITTWALD_TARGET_PATH }}
