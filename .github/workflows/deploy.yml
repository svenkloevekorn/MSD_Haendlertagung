name: Deploy to Mittwald

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MITTWALD_HOST }}
          port: ${{ secrets.MITTWALD_PORT }}
          username: ${{ secrets.MITTWALD_USER }}
          key: ${{ secrets.MITTWALD_SSH_KEY }}
          source: "*.html,assets/"
          target: ${{ secrets.MITTWALD_DEPLOY_PATH }}
          debug: true
