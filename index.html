<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Händlertagung 2026 | Mühlen Sohn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-950 text-white overflow-hidden h-screen">

    <!-- Particle Canvas -->
    <canvas id="particles"></canvas>

    <!-- Login Card -->
    <div class="relative z-10 flex items-center justify-center h-screen px-6">
        <div class="w-full max-w-sm">
            <!-- Logo -->
            <div class="text-center mb-10">
                <img src="assets/images/logo.svg" alt="Mühlen Sohn" class="h-12 mx-auto brightness-0 invert opacity-90 mb-6">
                <h1 class="text-2xl font-bold text-white mb-2">Händlertagung 2026</h1>
                <p class="text-sm text-gray-400">Bitte geben Sie Ihren Zugangscode ein</p>
            </div>

            <!-- Code Input -->
            <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8">
                <div class="flex justify-center gap-3 mb-8" id="code-inputs">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent" autofocus>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit w-12 h-14 text-center text-xl font-bold bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-400 focus:bg-white/15 transition caret-transparent">
                </div>

                <button id="login-btn" onclick="window.location.href='startseite.html'" class="w-full py-3.5 bg-green-500/80 hover:bg-green-500 text-white font-medium rounded-xl transition text-sm backdrop-blur-sm">
                    Anmelden
                </button>
            </div>

            <p class="text-center text-xs text-gray-500 mt-6">
                Den Zugangscode finden Sie in Ihrer Einladung.
            </p>
        </div>
    </div>

    <!-- Particle Fabric Animation -->
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let mouse = { x: null, y: null, radius: 200 };
        let time = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initNodes();
        }

        window.addEventListener('resize', resize);

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Grid-based nodes for fabric/web feel
        function initNodes() {
            nodes = [];
            const spacing = 40;
            const cols = Math.ceil(canvas.width / spacing) + 2;
            const rows = Math.ceil(canvas.height / spacing) + 2;
            const offsetX = (canvas.width - (cols - 1) * spacing) / 2;
            const offsetY = (canvas.height - (rows - 1) * spacing) / 2;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    nodes.push({
                        homeX: offsetX + col * spacing,
                        homeY: offsetY + row * spacing,
                        x: offsetX + col * spacing,
                        y: offsetY + row * spacing,
                        z: 0,
                        col: col,
                        row: row,
                        // Each node gets unique wave phase
                        phaseX: col * 0.3 + row * 0.15,
                        phaseY: row * 0.25 + col * 0.1,
                        phaseZ: col * 0.2 + row * 0.2,
                    });
                }
            }
        }

        function updateNodes() {
            time += 0.008;

            nodes.forEach(node => {
                // 3D wave motion — fabric billowing
                const waveX = Math.sin(time * 1.2 + node.phaseX) * 8 +
                              Math.sin(time * 0.7 + node.phaseY * 1.5) * 5;
                const waveY = Math.cos(time * 0.9 + node.phaseY) * 6 +
                              Math.sin(time * 1.4 + node.phaseX * 0.8) * 4;
                const waveZ = Math.sin(time * 0.6 + node.phaseZ) * 30 +
                              Math.cos(time * 1.1 + node.phaseZ * 1.3) * 20;

                let targetX = node.homeX + waveX;
                let targetY = node.homeY + waveY;
                let targetZ = waveZ;

                // Mouse: fabric pushes away like cloth being touched
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = node.homeX - mouse.x;
                    const dy = node.homeY - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        const force = (1 - dist / mouse.radius);
                        const power = force * force * 60;
                        targetX += (dx / dist) * power * 0.5;
                        targetY += (dy / dist) * power * 0.5;
                        targetZ += power * 1.5;
                    }
                }

                // Smooth spring toward target
                node.x += (targetX - node.x) * 0.08;
                node.y += (targetY - node.y) * 0.08;
                node.z += (targetZ - node.z) * 0.08;
            });
        }

        function getNodeIndex(col, row) {
            const cols = Math.ceil(canvas.width / 40) + 2;
            const rows = Math.ceil(canvas.height / 40) + 2;
            if (col < 0 || col >= cols || row < 0 || row >= rows) return -1;
            return row * cols + col;
        }

        function drawFabric() {
            const cols = Math.ceil(canvas.width / 40) + 2;

            nodes.forEach((node, i) => {
                // Depth-based brightness (3D effect)
                const depthFactor = (node.z + 50) / 100; // 0 to 1
                const brightness = Math.max(0.05, Math.min(0.6, depthFactor * 0.4 + 0.1));

                // Draw connections to right and bottom neighbors
                const rightIdx = getNodeIndex(node.col + 1, node.row);
                const bottomIdx = getNodeIndex(node.col, node.row + 1);
                const diagIdx = getNodeIndex(node.col + 1, node.row + 1);

                // Line opacity based on average depth of connected nodes
                if (rightIdx >= 0 && rightIdx < nodes.length) {
                    const neighbor = nodes[rightIdx];
                    const avgZ = (node.z + neighbor.z) / 2;
                    const lineDepth = (avgZ + 50) / 100;
                    const opacity = Math.max(0.02, Math.min(0.18, lineDepth * 0.15 + 0.03));
                    ctx.beginPath();
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(neighbor.x, neighbor.y);
                    ctx.strokeStyle = `rgba(14, 160, 57, ${opacity})`;
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }

                if (bottomIdx >= 0 && bottomIdx < nodes.length) {
                    const neighbor = nodes[bottomIdx];
                    const avgZ = (node.z + neighbor.z) / 2;
                    const lineDepth = (avgZ + 50) / 100;
                    const opacity = Math.max(0.02, Math.min(0.18, lineDepth * 0.15 + 0.03));
                    ctx.beginPath();
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(neighbor.x, neighbor.y);
                    ctx.strokeStyle = `rgba(14, 160, 57, ${opacity})`;
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }

                // Diagonal for richer mesh
                if (diagIdx >= 0 && diagIdx < nodes.length) {
                    const neighbor = nodes[diagIdx];
                    const avgZ = (node.z + neighbor.z) / 2;
                    const lineDepth = (avgZ + 50) / 100;
                    const opacity = Math.max(0.01, Math.min(0.08, lineDepth * 0.06 + 0.01));
                    ctx.beginPath();
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(neighbor.x, neighbor.y);
                    ctx.strokeStyle = `rgba(74, 222, 128, ${opacity})`;
                    ctx.lineWidth = 0.3;
                    ctx.stroke();
                }

                // Node dot — size and glow based on depth
                const dotSize = 0.8 + depthFactor * 1.5;

                // Glow for bright nodes
                if (brightness > 0.3) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, dotSize + 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(14, 160, 57, ${brightness * 0.15})`;
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(node.x, node.y, dotSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(14, 160, 57, ${brightness})`;
                ctx.fill();
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updateNodes();
            drawFabric();

            requestAnimationFrame(animate);
        }

        resize();
        animate();

        // Code input logic
        const digits = document.querySelectorAll('.code-digit');

        digits.forEach((digit, index) => {
            digit.addEventListener('input', (e) => {
                const val = e.target.value;
                // Only allow digits
                if (!/^\d$/.test(val)) {
                    e.target.value = '';
                    return;
                }
                // Move to next field
                if (val && index < digits.length - 1) {
                    digits[index + 1].focus();
                }
                // Auto-submit when all filled
                if (index === digits.length - 1 && val) {
                    document.getElementById('login-btn').focus();
                }
            });

            digit.addEventListener('keydown', (e) => {
                // Backspace: clear and go to previous
                if (e.key === 'Backspace') {
                    if (!digit.value && index > 0) {
                        digits[index - 1].focus();
                        digits[index - 1].value = '';
                    }
                }
                // Enter: submit
                if (e.key === 'Enter') {
                    window.location.href = 'startseite.html';
                }
                // Arrow keys
                if (e.key === 'ArrowLeft' && index > 0) {
                    digits[index - 1].focus();
                }
                if (e.key === 'ArrowRight' && index < digits.length - 1) {
                    digits[index + 1].focus();
                }
            });

            // Select content on focus
            digit.addEventListener('focus', () => {
                digit.select();
            });

            // Paste support
            digit.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                paste.split('').forEach((char, i) => {
                    if (digits[index + i]) {
                        digits[index + i].value = char;
                    }
                });
                const nextIndex = Math.min(index + paste.length, digits.length - 1);
                digits[nextIndex].focus();
            });
        });
    </script>

</body>
</html>
